<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Lock Practice</title>
<style>
  :root {
    --primary: #378ADD; --primary-dark: #185FA5;
    --warn: #E24B4A; --warn-dark: #A32D2D;
    --dot-bg: #ccc; --dot-border: #999; --text: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  
  #plw { width: 100%; max-width: 360px; }
  #grid-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto; touch-action: none; }
  #grid { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; height: 100%; position: relative; z-index: 2; }
  svg.lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  
  .dot-wrap { display: flex; align-items: center; justify-content: center; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dot-bg); border: 1.5px solid var(--dot-border); transition: 0.1s; }
  .dot.active { background: var(--primary); border-color: var(--primary-dark); transform: scale(1.5); }
  .dot.warn { background: var(--warn); border-color: var(--warn-dark); transform: scale(1.5); }
  
  #info { text-align: center; margin-top: 1.2rem; }
  #counter { font-size: 13px; color: var(--text); margin-bottom: 5px; }
  #status { font-size: 14px; font-weight: 500; min-height: 22px; color: #888; }
  #status.ok { color: #1D9E75; }
  #status.warn { color: var(--warn); }
  
  .btns { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
  button { padding: 5px 16px; font-size: 13px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 6px; }
  button:hover { background: #f0f0f0; }
  
  #hist-panel { margin-top: 1.2rem; border-top: 1px solid #e0e0e0; padding-top: 1rem; display: none; }
  #hist-panel.open { display: block; }
  #hist-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .hcard { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 6px 8px; cursor: pointer; text-align: center; }
  .hcard:hover { border-color: #999; }
  .hcard.warn-card { border-color: var(--warn); }
  .hlabel { font-size: 10px; color: var(--dot-border); display: block; margin-top: 4px; }
  
  #preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; }
  #preview-modal.open { display: flex; }
  #preview-box { background: #fff; border-radius: 12px; padding: 1.2rem; text-align: center; min-width: 220px; }
  .psub { font-size: 12px; color: var(--text); margin-top: 8px; }
</style>
</head>
<body>

<div id="plw">
  <div id="grid-wrap">
    <svg id="lines" class="lines" viewBox="0 0 220 220"></svg>
    <div id="grid"></div>
  </div>
  <div id="info">
    <div id="counter">Attempts: 0</div>
    <div id="status">Draw your pattern</div>
    <div class="btns">
      <button id="hist-btn">History (0)</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>
  <div id="hist-panel">
    <div style="font-size: 13px; color: #666; text-align: center; margin-bottom: 10px;">Last 20 patterns</div>
    <div id="hist-list"></div>
  </div>
</div>

<div id="preview-modal">
  <div id="preview-box">
    <h3 id="pv-title" style="margin-bottom:12px;">Pattern #1</h3>
    <div style="position:relative;width:140px;height:140px;margin:0 auto;">
      <svg id="pv-lines" class="lines" viewBox="0 0 140 140"></svg>
      <div id="pv-dots" style="display:grid;grid-template-columns:repeat(3,1fr);height:100%;position:relative;z-index:2;"></div>
    </div>
    <div class="psub" id="pv-seq"></div>
    <div class="psub" id="pv-warn" style="color:var(--warn);min-height:16px;"></div>
    <button id="preview-close" style="margin-top:12px;">Close</button>
  </div>
</div>

<script>
(function(){
  const grid = document.getElementById('grid'), svg = document.getElementById('lines');
  const statusEl = document.getElementById('status'), counterEl = document.getElementById('counter');
  const histList = document.getElementById('hist-list'), histBtn = document.getElementById('hist-btn');
  const modal = document.getElementById('preview-modal');
  
  let current = [], drawing = false, attempts = 0, lastPattern = null, history = [];
  const getPt = (i, size) => ({ x: (i%3)*size/3 + size/6, y: Math.floor(i/3)*size/3 + size/6 });

  // Init Main Grid
  grid.innerHTML = Array.from({length: 9}, (_, i) => `<div class="dot-wrap"><div class="dot" id="d${i}"></div></div>`).join('');

  function drawSVG(pts, warn, size) {
    const color = warn ? 'var(--warn)' : 'var(--primary)';
    return pts.slice(1).map((p, i) => {
      let a = getPt(pts[i], size), b = getPt(p, size);
      return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${color}" stroke-width="2" stroke-linecap="round"/>`;
    }).join('');
  }

  function miniSVG(pts, warn) {
    const c = warn ? 'var(--warn)' : 'var(--primary)';
    let lines = drawSVG(pts, warn, 60);
    let dots = Array.from({length: 9}, (_, i) => {
      let act = pts.includes(i), fst = pts[0]===i;
      return `<circle cx="${getPt(i, 60).x}" cy="${getPt(i, 60).y}" r="${act?3.5:2}" fill="${act?(fst?'var(--primary-dark)':c):'#888'}"/>`;
    }).join('');
    return `<svg width="60" height="60" viewBox="0 0 60 60">${lines}${dots}</svg>`;
  }

  function renderHistory() {
    histList.innerHTML = '';
    history.forEach((h) => {
      let card = document.createElement('div');
      card.className = 'hcard' + (h.warn ? ' warn-card' : '');
      card.innerHTML = miniSVG(h.pts, h.warn) + `<span class="hlabel">#${h.num}${h.warn?' ⚠':''}</span>`;
      card.onclick = () => showPreview(h);
      histList.appendChild(card);
    });
    histBtn.textContent = `History (${history.length})`;
  }

  function showPreview(h) {
    document.getElementById('pv-title').textContent = `Pattern #${h.num}`;
    document.getElementById('pv-warn').textContent = h.warn ? '⚠ Same as previous' : '';
    document.getElementById('pv-seq').textContent = 'Seq: ' + h.pts.join(' → ');
    document.getElementById('pv-lines').innerHTML = drawSVG(h.pts, h.warn, 140);
    
    document.getElementById('pv-dots').innerHTML = Array.from({length: 9}, (_, i) => {
      let act = h.pts.includes(i), fst = h.pts[0]===i;
      let bg = act ? (h.warn ? 'var(--warn)' : (fst ? 'var(--primary-dark)' : 'var(--primary)')) : 'var(--dot-bg)';
      let bc = act ? (h.warn ? 'var(--warn-dark)' : 'var(--primary-dark)') : 'var(--dot-border)';
      return `<div class="dot-wrap"><div style="width:10px;height:10px;border-radius:50%;background:${bg};border:1.5px solid ${bc}"></div></div>`;
    }).join('');
    modal.classList.add('open');
  }

  function handlePointer(e) {
    if (!drawing && e.type !== 'pointerdown') return;
    e.preventDefault();
    const rect = grid.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const col = Math.floor(x / (rect.width/3)), row = Math.floor(y / (rect.height/3));
    const i = row * 3 + col;

    if (e.type === 'pointerdown') {
      drawing = true; current = [];
      document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
      statusEl.className = ''; statusEl.textContent = 'Drawing...';
    }
    
    if (col >= 0 && col <= 2 && row >= 0 && row <= 2 && !current.includes(i)) {
      current.push(i);
      document.getElementById('d'+i).classList.add('active');
      svg.innerHTML = drawSVG(current, false, 220);
    }
  }

  function finishPattern() {
    if (!drawing) return;
    drawing = false;
    if (current.length < 2) return resetDots();
    
    attempts++; counterEl.textContent = 'Attempts: ' + attempts;
    const isDupe = lastPattern === current.join('-');
    statusEl.className = isDupe ? 'warn' : 'ok';
    statusEl.textContent = isDupe ? '⚠ Same pattern as last time!' : `Pattern saved (${current.length} dots)`;
    
    if (isDupe) current.forEach(i => document.getElementById('d'+i).classList.replace('active', 'warn'));
    svg.innerHTML = drawSVG(current, isDupe, 220);
    
    history.unshift({ pts: [...current], num: attempts, warn: isDupe });
    if (history.length > 20) history.pop();
    lastPattern = current.join('-');
    renderHistory();
    setTimeout(resetDots, 900);
  }

  function resetDots() {
    drawing = false; current = []; svg.innerHTML = '';
    document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
    if (statusEl.className !== 'warn') { statusEl.className = ''; statusEl.textContent = 'Draw your pattern'; }
  }

  // Pointer Events unification (replaces mouse/touch mix)
  grid.addEventListener('pointerdown', handlePointer);
  grid.addEventListener('pointermove', handlePointer);
  window.addEventListener('pointerup', finishPattern);

  // UI Event Listeners
  histBtn.onclick = () => { document.getElementById('hist-panel').classList.toggle('open'); };
  document.getElementById('reset-btn').onclick = () => {
    resetDots(); attempts = 0; lastPattern = null; history = [];
    counterEl.textContent = 'Attempts: 0'; renderHistory();
    document.getElementById('hist-panel').classList.remove('open');
  };
  document.getElementById('preview-close').onclick = () => modal.classList.remove('open');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('open'); };
})();
</script>
</body>
</html>
